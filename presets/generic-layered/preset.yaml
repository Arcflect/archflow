name: generic-layered
summary: Language-agnostic layered starter preset for Archflow
architecture_style: layered
ecosystem: generic
source_example: examples/generic-layered
includes:
  required:
    - project.arch.yaml
    - placement.rules.yaml
    - contracts.template.yaml
  optional:
    - artifacts.plan.yaml
    - policy.profile.yaml
    - guard.sidecar.yaml

package:
  version: 0.1.0
  visibility: public
  compatibility:
    min_archflow_version: 0.1.0
    max_archflow_version: 0.1.99
    project_schema_version: "1"
    policy_profile_version: 1
